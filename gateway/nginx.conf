events {}

http {

server {
    listen 80;
    http2 on;

    # -------------------------
    # Global CORS configuration
    # -------------------------
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # -------------------------
    # Frontend (React)
    # -------------------------
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Auth Service
    # -------------------------
    location /api/auth/ {
        proxy_pass http://auth:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Ingestion Service
    # -------------------------
    location /api/ingestion/ {
        proxy_pass http://ingestion:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # LLM REST API
    # -------------------------
    location /api/llm/ {
        proxy_pass http://llm:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # LLM gRPC Service
    # -------------------------
    location /evaluation.EvaluationService/EvaluateTheoryAnswer {
        grpc_pass grpc://llm:50051;

        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Management Service
    # -------------------------
    location /api/management/ {
        proxy_pass http://management:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Question Service
    # -------------------------
    location /api/question/ {
        proxy_pass http://question:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Answer Service
    # -------------------------
    location /api/answer/ {
        proxy_pass http://answer:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # Proctoring Service
    # -------------------------
    location /api/proctoring/ {
        proxy_pass http://proctoring:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------
    # WebSocket (Proctoring)
    # -------------------------
    location /ws/ {
        proxy_pass http://proctoring:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

}
}